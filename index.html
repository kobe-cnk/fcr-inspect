<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0B1F2A" />
<title>FCR Inspect</title>
<style>
  :root{
    --water:#0B1F2A;        /* deep water */
    --water-2:#12303D;      /* raised surface on dark */
    --surface:#F6F9FA;      /* off-white */
    --card:#FFFFFF;
    --line:#DDE6E9;
    --aqua:#00B4D8;         /* spray accent / primary */
    --aqua-press:#0098B8;
    --teal:#0E7C86;
    --flag:#FF6B35;         /* caution / damage */
    --flag-press:#E85525;
    --ink:#0B1F2A;
    --muted:#5A7079;
    --ok:#16A36B;
    --warn:#E0A100;
    --radius:16px;
    --tap:56px;
    --pad:16px;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--sans);
    color:var(--ink);
    background:var(--surface);
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  button{font-family:inherit}

  /* ---------- App shell ---------- */
  .app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  header.bar{
    position:sticky;top:0;z-index:20;
    background:var(--water);color:#EAF6F8;
    padding:calc(env(safe-area-inset-top) + 12px) var(--pad) 12px;
    display:flex;align-items:center;gap:12px;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.2px}
  .brand .mark{
    width:30px;height:30px;border-radius:9px;flex:0 0 auto;
    background:linear-gradient(150deg,var(--aqua),var(--teal));
    display:grid;place-items:center;color:#031018;font-size:16px;
  }
  .brand small{display:block;font-weight:600;font-size:11px;color:#86B6C2;letter-spacing:1.4px;text-transform:uppercase;margin-top:-2px}
  .net{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:#A9C9D2}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--ok)}
  .dot.off{background:var(--flag)}
  .dot.sync{background:var(--warn);animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  main{flex:1;padding:var(--pad);padding-bottom:120px}

  h1.screen{font-size:22px;margin:6px 0 16px;letter-spacing:-.3px}
  .sub{color:var(--muted);font-size:14px;margin:-10px 0 18px}

  /* ---------- Buttons ---------- */
  .btn{
    display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
    min-height:var(--tap);border:none;border-radius:14px;
    font-size:17px;font-weight:700;cursor:pointer;padding:0 18px;
    background:var(--aqua);color:#02141A;transition:transform .04s ease,background .15s;
  }
  .btn:active{transform:translateY(1px);background:var(--aqua-press)}
  .btn.secondary{background:#E7EEF0;color:var(--ink)}
  .btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
  .btn.flag{background:var(--flag);color:#fff}
  .btn.flag:active{background:var(--flag-press)}
  .btn.dark{background:var(--water);color:#EAF6F8}
  .btn.lg{min-height:64px;font-size:18px}
  .btn[disabled]{opacity:.45;pointer-events:none}
  .btn .ico{font-size:20px;line-height:1}

  .row{display:flex;gap:12px}
  .row .btn{flex:1}

  /* ---------- Home cards ---------- */
  .choose{display:grid;gap:14px;margin-bottom:26px}
  .choose .big{
    min-height:96px;border-radius:var(--radius);border:none;cursor:pointer;
    display:flex;align-items:center;gap:16px;padding:0 20px;text-align:left;color:#fff;
    box-shadow:0 6px 18px rgba(11,31,42,.10);
  }
  .choose .out{background:linear-gradient(135deg,#0E7C86,#00B4D8)}
  .choose .in{background:linear-gradient(135deg,#16324A,#0E7C86)}
  .choose .big .glyph{font-size:30px}
  .choose .big b{display:block;font-size:20px}
  .choose .big span{font-size:13px;opacity:.85;font-weight:500}

  .section-h{display:flex;align-items:center;justify-content:space-between;margin:8px 2px 12px}
  .section-h h2{font-size:15px;margin:0;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted)}
  .link{background:none;border:none;color:var(--aqua);font-weight:700;font-size:14px;cursor:pointer;padding:6px}

  /* ---------- List ---------- */
  .list{display:flex;flex-direction:column;gap:10px}
  .item{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;
  }
  .item:active{background:#F0F5F6}
  .pill{font-size:11px;font-weight:800;letter-spacing:.4px;padding:4px 8px;border-radius:999px;text-transform:uppercase}
  .pill.out{background:#DBF3F7;color:#0B5563}
  .pill.in{background:#E4ECEF;color:#36505A}
  .item .meta{flex:1;min-width:0}
  .item .meta b{display:block;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .meta small{color:var(--muted);font-size:12.5px}
  .item .when{font-family:var(--mono);font-size:11.5px;color:var(--muted);text-align:right;white-space:nowrap}
  .item .flagdot{color:var(--flag);font-size:13px}
  .empty{text-align:center;color:var(--muted);padding:36px 10px;font-size:14px;line-height:1.5}
  .empty .ico{font-size:34px;display:block;margin-bottom:10px;opacity:.5}

  /* ---------- Forms ---------- */
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:7px}
  .field .hint{color:var(--muted);font-weight:500}
  input,select,textarea{
    width:100%;min-height:52px;border:1.5px solid var(--line);border-radius:12px;
    padding:12px 14px;font-size:16px;background:#fff;color:var(--ink);font-family:inherit;
  }
  textarea{min-height:90px;resize:vertical;line-height:1.45}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--aqua);box-shadow:0 0 0 3px rgba(0,180,216,.18)}
  .reading{font-family:var(--mono);font-size:20px;letter-spacing:.5px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .fuelseg{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}
  .fuelbtn{height:var(--tap);min-height:50px;border:1px solid var(--line);background:var(--card);border-radius:11px;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;padding:0;transition:background .12s,color .12s,border-color .12s,transform .04s}
  .fuelbtn:active{transform:translateY(1px)}
  .fuelbtn.on{background:var(--aqua);border-color:var(--aqua);color:#02141A}
  .fuelends{display:flex;justify-content:space-between;margin-top:6px;padding:0 2px;font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1px}
  .card-block{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:16px}
  .card-block > h3{margin:0 0 14px;font-size:14px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}

  /* ---------- Capture ---------- */
  .stage{position:relative;background:#000;border-radius:14px;overflow:hidden;aspect-ratio:3/4;display:grid;place-items:center}
  .stage video{width:100%;height:100%;object-fit:cover}
  .stage .stamp{
    position:absolute;left:10px;bottom:10px;font-family:var(--mono);font-size:11px;
    color:#fff;background:rgba(0,0,0,.55);padding:4px 8px;border-radius:6px;backdrop-filter:blur(2px)
  }
  .stage .rec{
    position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:7px;
    background:rgba(0,0,0,.55);color:#fff;font-family:var(--mono);font-size:13px;padding:5px 10px;border-radius:999px
  }
  .stage .rec .b{width:11px;height:11px;border-radius:50%;background:var(--flag);animation:pulse 1s infinite}
  .stage .placeholder{color:#8aa;text-align:center;padding:24px;font-size:14px;line-height:1.5}
  .stage .placeholder .ico{font-size:40px;display:block;margin-bottom:10px}
  .cap-controls{display:flex;gap:10px;margin-top:12px}
  .cap-controls .btn{flex:1}
  .shutter{
    flex:0 0 auto !important;width:74px;height:74px;border-radius:50%;border:5px solid #fff;
    background:var(--flag);color:#fff;display:grid;place-items:center;cursor:pointer;
    box-shadow:0 4px 14px rgba(255,107,53,.4);
  }
  .shutter.idle{background:var(--flag)}
  .shutter.recording{background:#fff}
  .shutter.recording .inner{width:26px;height:26px;border-radius:6px;background:var(--flag)}

  .thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
  .thumb{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;background:#0b1f2a;border:1px solid var(--line)}
  .thumb img,.thumb video{width:100%;height:100%;object-fit:cover}
  .thumb .tag{position:absolute;left:4px;bottom:4px;font-size:9px;font-weight:800;color:#fff;background:rgba(0,0,0,.6);padding:2px 5px;border-radius:5px}
  .thumb .x{position:absolute;top:3px;right:3px;width:22px;height:22px;border:none;border-radius:50%;background:rgba(0,0,0,.65);color:#fff;font-size:14px;line-height:1;cursor:pointer}
  .count-note{font-size:12.5px;color:var(--muted);margin-top:10px}

  /* signature */
  .sig-wrap{border:1.5px dashed var(--line);border-radius:12px;background:#fff;position:relative}
  canvas.sig{width:100%;height:160px;display:block;touch-action:none;border-radius:12px}
  .sig-wrap .clear{position:absolute;top:8px;right:8px;background:#fff;border:1px solid var(--line);border-radius:8px;font-size:12px;font-weight:700;padding:5px 9px;cursor:pointer;color:var(--muted)}
  .sig-base{position:absolute;left:14px;right:90px;bottom:30px;border-top:1px solid var(--line);font-size:11px;color:#b8c6cb;padding-top:4px}

  .check{display:flex;align-items:flex-start;gap:12px;background:#FFF4EF;border:1px solid #FFD9C9;border-radius:12px;padding:14px;margin-bottom:16px;cursor:pointer}
  .check input{width:22px;height:22px;min-height:0;margin-top:1px;accent-color:var(--flag)}
  .check b{font-size:14px}
  .check small{display:block;color:var(--muted);font-size:12.5px;margin-top:2px}

  /* ---------- Bottom action bar ---------- */
  .actionbar{
    position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:linear-gradient(180deg,rgba(246,249,250,0),var(--surface) 28%);
    padding:18px var(--pad) calc(env(safe-area-inset-bottom) + 16px);
  }
  .actionbar .inner{max-width:560px;margin:0 auto}

  /* ---------- Record view ---------- */
  .rv-head{background:var(--water);color:#EAF6F8;border-radius:var(--radius);padding:18px;margin-bottom:16px}
  .rv-head .pill{margin-bottom:10px;display:inline-block}
  .rv-head h2{margin:0 0 4px;font-size:20px}
  .rv-head .ts{font-family:var(--mono);font-size:12px;color:#9CC2CC;margin-top:8px}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:8px 16px;font-size:14px}
  .kv dt{color:var(--muted);font-weight:600}
  .kv dd{margin:0;font-weight:600;font-family:var(--mono)}
  .media-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .media-grid .cell{border-radius:12px;overflow:hidden;background:#000;aspect-ratio:3/4;position:relative}
  .media-grid .cell img,.media-grid .cell video{width:100%;height:100%;object-fit:cover}
  .media-grid .cell .tag{position:absolute;left:6px;bottom:6px;font-family:var(--mono);font-size:10px;color:#fff;background:rgba(0,0,0,.6);padding:2px 6px;border-radius:5px}
  .dlbtn{position:absolute;top:6px;right:6px;width:32px;height:32px;border:none;border-radius:9px;background:rgba(0,0,0,.62);color:#fff;font-size:17px;font-weight:800;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .dlbtn:active{background:var(--aqua);color:#02141A}
  .gallhead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
  .gallhead b{display:block;font-size:15px;color:var(--ink)} .gallhead small{display:block;font-size:12px;color:var(--muted);margin-top:2px}
  .btn.small{height:auto;min-height:0;padding:9px 13px;font-size:13px;width:auto;flex:0 0 auto}
  .media-grid .gcell{aspect-ratio:auto;background:var(--card);border:1px solid var(--line)}
  .media-grid .gcell img,.media-grid .gcell video{aspect-ratio:3/4;background:#000}
  .gcap{padding:8px 9px 10px}
  .gcap b{display:block;font-size:12.5px;color:var(--ink);line-height:1.25} .gcap small{display:block;font-size:11px;color:var(--muted);margin:2px 0 3px}
  .compare-col h4{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:0 0 8px}
  .flagbar{background:#FFF4EF;border:1px solid #FFD9C9;border-radius:12px;padding:12px 14px;font-size:13px;color:#9A3412;display:flex;align-items:center;gap:8px;margin-bottom:16px}

  .modal{position:fixed;inset:0;z-index:50;background:rgba(11,31,42,.55);display:none;align-items:flex-end}
  .modal.open{display:flex}
  .sheet{background:var(--surface);width:100%;max-width:560px;margin:0 auto;border-radius:20px 20px 0 0;padding:20px var(--pad) calc(env(safe-area-inset-bottom) + 20px);max-height:84vh;overflow:auto}
  .sheet h3{margin:2px 0 16px}
  .mach-row{display:flex;gap:8px;margin-bottom:8px}
  .mach-row input{flex:1}
  .mach-row .del{flex:0 0 auto;width:52px;border:1.5px solid var(--line);background:#fff;border-radius:12px;color:var(--flag);font-size:20px;cursor:pointer}

  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 96px);background:var(--water);color:#EAF6F8;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;z-index:60;opacity:0;pointer-events:none;transition:opacity .2s;max-width:90%}
  .toast.show{opacity:1}

  .hidden{display:none !important}
  .banner{background:#FFFBEB;border:1px solid #FDE68A;color:#92660A;border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.45;margin-bottom:16px}

  /* unit type-ahead */
  .ac{position:relative}
  .ac-list{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:25;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 28px rgba(11,31,42,.16);overflow-y:auto;max-height:300px}
  .ac-item{padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--line)}
  .ac-item:last-child{border-bottom:none}
  .ac-item:active{background:#F0F5F6}
  .ac-item b{display:block;font-size:15px}
  .ac-item small{color:var(--muted);font-size:12px}
  .ac-add{padding:13px 14px;cursor:pointer;color:var(--aqua);font-weight:700;background:#F4FBFD}
  .ac-add:active{background:#E6F6FA}
  .item.muted{opacity:.55}
</style>
</head>
<body>
<div class="app">
  <header class="bar">
    <div class="brand">
      <span class="mark">⚓</span>
      <span>FCR Inspect<small>First Class Rentals</small></span>
    </div>
    <div class="net" id="net"><span class="dot" id="netdot"></span><span id="nettext">Online</span></div>
  </header>

  <main id="main"></main>

  <div class="actionbar" id="actionbar"></div>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<!-- hidden working canvas for photo capture -->
<canvas id="work" class="hidden"></canvas>

<script>
"use strict";

/* =========================================================================
   FCR Inspect — local-first field inspection tool
   - Records short video clips + photos, stored on-device (IndexedDB)
   - Saves every inspection instantly; syncs in the background when online
   - Cloud sync (Cloudflare R2) is wired but OFF until CONFIG.r2 is set
   ========================================================================= */

const CONFIG = {
  retentionDays: 180,          // auto-clear media after this many days unless kept for a claim
  videoBitsPerSecond: 2_000_000, // ~2 Mbps -> a 30s clip is ~7-8 MB
  maxPhotoEdge: 1600,          // downscale photos to this longest edge
  photoQuality: 0.7,
  r2: null,                    // set later: { endpoint, ... } to turn on cloud backup
  notifyEmail: "FCRutah@gmail.com",  // damage flags go here
  notifyEndpoint: null,        // set to a Formspree/webhook URL to send the alert automatically; otherwise opens a pre-filled email
  fleetQueueKey: "fcr_inspect_pending" // shared with FCR Fleet: units to mark Down on its next open
};

/* ---------------- tiny helpers ---------------- */
const $ = (s,el=document)=>el.querySelector(s);
const el = (tag,props={},...kids)=>{
  const n=document.createElement(tag);
  for(const k in props){
    if(k==="class")n.className=props[k];
    else if(k==="html")n.innerHTML=props[k];
    else if(k.startsWith("on"))n.addEventListener(k.slice(2),props[k]);
    else n.setAttribute(k,props[k]);
  }
  for(const kid of kids){ if(kid==null)continue; n.append(kid.nodeType?kid:document.createTextNode(kid)); }
  return n;
};
const uid = ()=> (Date.now().toString(36)+Math.random().toString(36).slice(2,8));
const fmtTime = ts=>{
  const d=new Date(ts);
  return d.toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
};
const fmtFull = ts=> new Date(ts).toLocaleString(undefined,{weekday:"short",year:"numeric",month:"short",day:"numeric",hour:"numeric",minute:"2-digit",second:"2-digit"});
function machineName(m){ if(!m) return ""; if(m.name!==undefined||m.yr!==undefined||m.mid!==undefined){ const base=[m.yr,m.name].filter(Boolean).join(" "); return (base||"Unit")+(m.mid?" #"+m.mid:""); } const d=[m.year,m.make,m.model].filter(Boolean).join(" ").trim(); return d || m.model || "Unit"; }
function parseUnit(str){ const t=(str||"").trim().split(/\s+/).filter(Boolean); let year="",make="",model=""; if(t.length && /^\d{4}$/.test(t[0])) year=t.shift(); if(t.length>=2){ make=t.shift(); model=t.join(" "); } else if(t.length===1){ model=t[0]; } return {year,make,model}; }
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }

let DEVICE_ID = localStorage.getItem("fcr_device") || (()=>{const v="dev-"+uid();localStorage.setItem("fcr_device",v);return v;})();

/* ---------------- IndexedDB ---------------- */
const DB = (()=>{
  let dbp;
  function open(){
    if(dbp) return dbp;
    dbp = new Promise((res,rej)=>{
      const r = indexedDB.open("fcr_inspect",1);
      r.onupgradeneeded = ()=>{
        const db=r.result;
        if(!db.objectStoreNames.contains("machines")) db.createObjectStore("machines",{keyPath:"id"});
        if(!db.objectStoreNames.contains("inspections")) db.createObjectStore("inspections",{keyPath:"id"});
        if(!db.objectStoreNames.contains("media")){
          const m=db.createObjectStore("media",{keyPath:"id"});
          m.createIndex("byInspection","inspectionId",{unique:false});
        }
      };
      r.onsuccess=()=>res(r.result);
      r.onerror=()=>rej(r.error);
    });
    return dbp;
  }
  const tx=(store,mode)=>open().then(db=>db.transaction(store,mode).objectStore(store));
  const req=(rq)=>new Promise((res,rej)=>{rq.onsuccess=()=>res(rq.result);rq.onerror=()=>rej(rq.error);});
  return {
    put:(store,val)=>tx(store,"readwrite").then(s=>req(s.put(val))),
    get:(store,key)=>tx(store,"readonly").then(s=>req(s.get(key))),
    del:(store,key)=>tx(store,"readwrite").then(s=>req(s.delete(key))),
    all:(store)=>tx(store,"readonly").then(s=>req(s.getAll())),
    byIndex:(store,index,key)=>tx(store,"readonly").then(s=>req(s.index(index).getAll(key)))
  };
})();

/* ---------------- fleet (read from FCR Fleet Manager — the master list) ---------------- */
const FLEET_SRC = {
  ls:"fcr_v9",                                  // same-origin storage Fleet Manager writes
  raw:"https://raw.githubusercontent.com/kobe-cnk/fcr-fleet/main/data.json",
  rawAlt:"https://raw.githubusercontent.com/kobe-cnk/fcr-fleet/master/data.json",
  manageUrl:"https://kobe-cnk.github.io/fcr-fleet/"
};
const CAT_LABEL = {gti:"GTI 130", t3:"Spark 3UP", t2:"Spark 2UP", boat:"Boat"};
let FLEET = [];
function normUnit(u){ return { fid:String(u.id), name:u.name||"", yr:u.yr||"", mid:u.mid||"", cat:u.cat||"", type:CAT_LABEL[u.cat]||(u.cat||"Unit"), status:u.status||"" }; }
async function loadFleet(){
  let units=[];
  try{ const ls=localStorage.getItem(FLEET_SRC.ls); if(ls){ const j=JSON.parse(ls); if(Array.isArray(j)) units=j; } }catch(e){}
  try{
    let r=await fetch(FLEET_SRC.raw,{cache:"no-store"});
    if(!r.ok) r=await fetch(FLEET_SRC.rawAlt,{cache:"no-store"});
    if(r.ok){ const j=await r.json(); if(Array.isArray(j)&&j.length) units=j; }
  }catch(e){}
  FLEET = units.map(normUnit);
  return FLEET;
}

/* ---------------- media capture ---------------- */
let stream=null, recorder=null, recChunks=[], recTimer=null, recStart=0;
const captured = []; // {id, kind, blob, mime, createdAt, thumbUrl}

async function startCamera(stageVideo){
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ideal:"environment"}, width:{ideal:1280}, height:{ideal:1280} },
      audio:true
    });
    stageVideo.srcObject=stream;
    await stageVideo.play().catch(()=>{});
    return true;
  }catch(err){
    return err;
  }
}
function stopCamera(){
  if(recorder && recorder.state!=="inactive"){ try{recorder.stop();}catch(e){} }
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
}
function pickVideoMime(){
  const opts=["video/mp4;codecs=h264","video/mp4","video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm"];
  for(const o of opts){ if(window.MediaRecorder && MediaRecorder.isTypeSupported(o)) return o; }
  return "";
}
function snapPhoto(stageVideo){
  const w=$("#work");
  const vw=stageVideo.videoWidth||1280, vh=stageVideo.videoHeight||1280;
  const scale=Math.min(1, CONFIG.maxPhotoEdge/Math.max(vw,vh));
  w.width=Math.round(vw*scale); w.height=Math.round(vh*scale);
  w.getContext("2d").drawImage(stageVideo,0,0,w.width,w.height);
  return new Promise(res=>{
    w.toBlob(b=>{
      const item={id:uid(),kind:"photo",blob:b,mime:"image/jpeg",createdAt:Date.now(),thumbUrl:URL.createObjectURL(b)};
      captured.push(item); res(item);
    },"image/jpeg",CONFIG.photoQuality);
  });
}

/* ---------------- signature pad ---------------- */
function initSig(canvas){
  const ctx=canvas.getContext("2d");
  const rect=()=>canvas.getBoundingClientRect();
  function size(){ const r=rect(); const dpr=window.devicePixelRatio||1; canvas.width=r.width*dpr; canvas.height=r.height*dpr; ctx.scale(dpr,dpr); ctx.lineWidth=2.4; ctx.lineCap="round"; ctx.lineJoin="round"; ctx.strokeStyle="#0B1F2A"; }
  size();
  let drawing=false, dirty=false;
  const pos=e=>{ const r=rect(); const p=e.touches?e.touches[0]:e; return [p.clientX-r.left,p.clientY-r.top]; };
  const down=e=>{ drawing=true; const [x,y]=pos(e); ctx.beginPath(); ctx.moveTo(x,y); e.preventDefault(); };
  const move=e=>{ if(!drawing)return; const [x,y]=pos(e); ctx.lineTo(x,y); ctx.stroke(); dirty=true; e.preventDefault(); };
  const up=()=>{ drawing=false; };
  canvas.addEventListener("pointerdown",down); canvas.addEventListener("pointermove",move);
  window.addEventListener("pointerup",up);
  return {
    clear:()=>{ ctx.clearRect(0,0,canvas.width,canvas.height); dirty=false; },
    isEmpty:()=>!dirty,
    dataUrl:()=> dirty ? canvas.toDataURL("image/png") : null
  };
}

/* ---------------- sync (stub, real-ready) ---------------- */
function syncEnabled(){ return !!CONFIG.r2; }
async function syncNow(){
  if(!syncEnabled() || !navigator.onLine) return;
  setNet("sync");
  const items = await DB.all("inspections");
  for(const insp of items){
    if(insp.synced) continue;
    // when R2 is configured: upload each media blob, set remoteUrl, then mark synced.
    // left as a no-op until CONFIG.r2 is provided so nothing breaks pre-setup.
  }
  setNet(navigator.onLine?"online":"off");
}

/* ---------------- retention cleanup ---------------- */
async function runRetention(){
  const cutoff=Date.now()-CONFIG.retentionDays*86400000;
  const insps=await DB.all("inspections");
  const keepIds=new Set(insps.filter(i=>i.keepForClaim).map(i=>i.id));
  const media=await DB.all("media");
  for(const m of media){
    if(m.createdAt<cutoff && !keepIds.has(m.inspectionId)){
      await DB.del("media",m.id);
    }
  }
}

/* ---------- CAPTURE ---------- */
async function renderCapture(){
  const main=$("#main"); main.innerHTML="";
  main.append(el("h1",{class:"screen"}, DRAFT.type==="checkout"?"Checkout — capture":"Check-in — capture"));
  main.append(el("p",{class:"sub"}, DRAFT.machineName+" · "+DRAFT.customerName));

  const stage=el("div",{class:"stage"});
  const vid=el("video",{playsinline:"",muted:"",autoplay:""});
  const stamp=el("div",{class:"stamp"}, DRAFT.machineName+"  ·  "+new Date().toLocaleDateString());
  const recBadge=el("div",{class:"rec hidden"}, el("span",{class:"b"}), el("span",{id:"rectime"},"0:00"));
  const ph=el("div",{class:"placeholder"}, el("span",{class:"ico"},"📷"), "Starting camera…");
  stage.append(ph);
  main.append(stage);

  // controls
  const shutter=el("button",{class:"shutter idle",title:"Record video"}, el("span",{class:"inner hidden"}));
  const photoBtn=el("button",{class:"btn dark",onclick:async()=>{ if(!stream){toast("Camera not ready");return;} await snapPhoto(vid); drawThumbs(); toast("Photo saved"); }}, el("span",{class:"ico"},"📸"),"Photo");
  const controls=el("div",{class:"cap-controls"}, photoBtn, shutter);
  main.append(controls);
  const note=el("div",{class:"count-note"});
  main.append(note);
  const thumbs=el("div",{class:"thumbs"});
  main.append(thumbs);

  function drawThumbs(){
    thumbs.innerHTML="";
    captured.forEach(c=>{
      const cell=el("div",{class:"thumb"});
      if(c.kind==="photo") cell.append(el("img",{src:c.thumbUrl}));
      else { const v=el("video",{src:c.thumbUrl,muted:"",playsinline:""}); cell.append(v); }
      cell.append(el("span",{class:"tag"}, c.kind==="video"?"VIDEO":"PHOTO"));
      cell.append(el("button",{class:"x",onclick:()=>{ const i=captured.indexOf(c); if(i>-1){URL.revokeObjectURL(c.thumbUrl);captured.splice(i,1);drawThumbs();} }},"×"));
      thumbs.append(cell);
    });
    note.textContent = captured.length? captured.length+" item(s) captured — add as many angles as you need." : "Tip: a slow walk-around video catches every scratch the photos miss.";
    refreshCaptureAction();
  }
  drawThumbs();

  // start camera
  const camResult = await startCamera(vid);
  if(camResult===true){
    ph.remove(); stage.append(vid,stamp,recBadge);
  }else{
    let msg="Camera unavailable.";
    if(camResult && camResult.name==="NotAllowedError") msg="Camera permission was blocked. Allow camera access in your browser, then reopen this screen.";
    else if(location.protocol!=="https:" && location.hostname!=="localhost") msg="The camera only works on a secure (https) address. Once this is live on the web, it'll record fine.";
    ph.innerHTML=""; ph.append(el("span",{class:"ico"},"🚫"), msg);
  }

  // record toggle
  shutter.addEventListener("click",()=>{
    if(!stream){ toast("Camera not ready"); return; }
    if(recorder && recorder.state==="recording"){ stopRec(); }
    else { startRec(); }
  });
  function startRec(){
    recChunks=[]; const mime=pickVideoMime();
    try{ recorder=new MediaRecorder(stream, mime?{mimeType:mime,videoBitsPerSecond:CONFIG.videoBitsPerSecond}:{videoBitsPerSecond:CONFIG.videoBitsPerSecond}); }
    catch(e){ toast("Recording not supported on this browser"); return; }
    recorder.ondataavailable=e=>{ if(e.data&&e.data.size)recChunks.push(e.data); };
    recorder.onstop=()=>{
      const blob=new Blob(recChunks,{type:recorder.mimeType||"video/webm"});
      const item={id:uid(),kind:"video",blob,mime:blob.type,createdAt:Date.now(),thumbUrl:URL.createObjectURL(blob)};
      captured.push(item); drawThumbs();
    };
    recorder.start();
    recStart=Date.now(); recBadge.classList.remove("hidden");
    shutter.className="shutter recording"; shutter.querySelector(".inner").classList.remove("hidden");
    recTimer=setInterval(()=>{ const s=Math.floor((Date.now()-recStart)/1000); $("#rectime").textContent=Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); },250);
  }
  function stopRec(){
    if(recorder && recorder.state!=="inactive") recorder.stop();
    clearInterval(recTimer); recBadge.classList.add("hidden");
    shutter.className="shutter idle"; shutter.querySelector(".inner").classList.add("hidden");
  }

  function refreshCaptureAction(){
    action(
      el("button",{class:"btn secondary",onclick:()=>{ stopCamera(); go("new",{type:DRAFT.type}); }},"Back"),
      el("button",{class:"btn",onclick:()=>{ if(captured.length===0){toast("Capture at least one video or photo");return;} stopCamera(); go("sign"); }},
        el("span",{class:"ico"},"✍️"),"Next: sign off")
    );
  }
  refreshCaptureAction();
}

async function saveInspection(main){
  const now=Date.now();
  const record={
    ...DRAFT,
    createdAt:now,
    createdBy:DEVICE_ID,
    mediaCount:captured.length,
    synced:false
  };
  // persist media blobs
  for(const c of captured){
    await DB.put("media",{id:c.id,inspectionId:record.id,kind:c.kind,blob:c.blob,mime:c.mime,createdAt:c.createdAt,remoteUrl:null});
  }
  record.mediaIds=captured.map(c=>c.id);
  await DB.put("inspections",record);

  // reset draft + captured
  captured.forEach(c=>URL.revokeObjectURL(c.thumbUrl));
  captured.length=0; DRAFT=null;

  // damage flagged -> alert the office + flag the unit Down in FCR Fleet
  if(record.keepForClaim){
    queueFleetDown(record);
    notifyDamage(record);
    toast("Saved \u00b7 damage flagged \u2691");
  } else {
    toast("Saved on device \u2713");
  }
  syncNow();
  go("record",{id:record.id});
}

function damageText(insp){

    "Stage: "+(insp.type==="checkout"?"Checkout":"Check-in"),

function openMailto(subject,body){
  const url="mailto:"+encodeURIComponent(CONFIG.notifyEmail)+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);
  const a=document.createElement("a"); a.href=url; document.body.appendChild(a); a.click(); a.remove();
}
async function notifyDamage(insp){
  const subject="\u2691 Damage \u2014 "+(insp.machineName||"Unit")+" ("+(insp.customerName||"customer")+")";
  const body=damageText(insp);
  if(CONFIG.notifyEndpoint){
    try{
      await fetch(CONFIG.notifyEndpoint,{method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},
        body:JSON.stringify({email:CONFIG.notifyEmail,_replyto:CONFIG.notifyEmail,subject:subject,message:body,
          unit:insp.machineName,customer:insp.customerName,when:fmtFull(insp.createdAt)})});
    }catch(e){ openMailto(subject,body); }
  } else {
    openMailto(subject,body);
  }
}
function queueFleetDown(insp){
  try{
    const k=CONFIG.fleetQueueKey;
    const q=JSON.parse(localStorage.getItem(k)||"[]");
    q.push({
      unitId:String(insp.machineId||""),
      unitName:insp.machineName||"",
      customer:insp.customerName||"",
      when:insp.createdAt,
      recordId:insp.id,
      note:"Damage flagged via FCR Inspect"+(insp.customerName?(" \u2014 "+insp.customerName):"")+(insp.notes?(" \u2014 "+insp.notes):"")
    });
    localStorage.setItem(k,JSON.stringify(q));
  }catch(e){}
}

function mediaGrid(media,cols){
  const g=el("div",{class:"media-grid",style:cols===1?"grid-template-columns:1fr":""});
  if(!media.length) return el("div",{class:"empty",style:"padding:18px"},"No media kept (may have auto-cleared).");
  media.forEach(m=>{
    const url=URL.createObjectURL(m.blob);
    const cell=el("div",{class:"cell"});
    if(m.kind==="photo") cell.append(el("img",{src:url}));
    else cell.append(el("video",{src:url,controls:"",playsinline:""}));
    cell.append(el("span",{class:"tag"}, m.kind.toUpperCase()));
    cell.append(el("button",{class:"dlbtn",title:"Download",onclick:e=>{e.stopPropagation();downloadBlob(m.blob,mediaFileName(m));}},"\u2193"));
    g.append(cell);
  });
  return g;
}

/* ---------- media download helpers ---------- */
function extFor(m){ const t=(m.mime||"").split("/")[1]||""; if(t) return t.replace("quicktime","mov").split(";")[0]; return m.kind==="photo"?"jpg":"mp4"; }
function safeName(s){ return (s||"").replace(/[^a-z0-9]+/gi,"-").replace(/^-+|-+$/g,"").slice(0,40)||"unit"; }
function mediaFileName(m,unitName){
  const d=new Date(m.createdAt||Date.now());
  const stamp=d.getFullYear()+("0"+(d.getMonth()+1)).slice(-2)+("0"+d.getDate()).slice(-2)+"-"+("0"+d.getHours()).slice(-2)+("0"+d.getMinutes()).slice(-2)+("0"+d.getSeconds()).slice(-2);
  return (unitName?safeName(unitName)+"_":"")+(m.kind||"media")+"_"+stamp+"_"+String(m.id).slice(-4)+"."+extFor(m);
}
function downloadBlob(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=el("a",{href:url,download:filename}); document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}
function crc32(u8){
  if(!crc32.t){ crc32.t=[]; for(let n=0;n<256;n++){ let c=n; for(let k=0;k<8;k++) c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1); crc32.t[n]=c>>>0; } }
  const t=crc32.t; let crc=0xFFFFFFFF;
  for(let i=0;i<u8.length;i++) crc=(crc>>>8)^t[(crc^u8[i])&0xFF];
  return (crc^0xFFFFFFFF)>>>0;
}
async function zipStore(files){ // files:[{name, blob}] -> store-only zip Blob
  const enc=new TextEncoder();
  const u16=v=>new Uint8Array([v&255,(v>>>8)&255]);
  const u32=v=>new Uint8Array([v&255,(v>>>8)&255,(v>>>16)&255,(v>>>24)&255]);
  const parts=[], central=[]; let offset=0;
  for(const f of files){
    const data=new Uint8Array(await f.blob.arrayBuffer());
    const nameB=enc.encode(f.name);
    const crc=crc32(data), size=data.length;
    const lh=[new Uint8Array([0x50,0x4b,0x03,0x04]),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(size),u32(size),u16(nameB.length),u16(0)];
    lh.forEach(b=>parts.push(b)); parts.push(nameB,data);
    const cd=[new Uint8Array([0x50,0x4b,0x01,0x02]),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(size),u32(size),u16(nameB.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset)];
    cd.forEach(b=>central.push(b)); central.push(nameB);
    let lhLen=0; lh.forEach(b=>lhLen+=b.length);
    offset += lhLen + nameB.length + size;
  }
  let cdSize=0; central.forEach(b=>cdSize+=b.length);
  const eocd=[new Uint8Array([0x50,0x4b,0x05,0x06]),u16(0),u16(0),u16(files.length),u16(files.length),u32(cdSize),u32(offset),u16(0)];
  return new Blob([...parts,...central,...eocd],{type:"application/zip"});
}

function shareRecord(insp){
  const lines=[
    "First Class Rentals — "+(insp.type==="checkout"?"Checkout":"Check-in")+" record",
    insp.machineName,
    "Customer: "+(insp.customerName||"—"),
    "When: "+fmtFull(insp.createdAt),
    "Hours/meter: "+(insp.hours!==""?insp.hours:"—")+"   Fuel: "+(insp.fuel!==""?insp.fuel:"—"),
    insp.notes?("Notes: "+insp.notes):null,
    (insp.mediaCount||0)+" video/photo item(s) on file.",
    insp.keepForClaim?"\u2691 Flagged for a damage claim.":null
  ].filter(Boolean);
  const text=lines.join("\n");
  if(navigator.share){ navigator.share({title:"FCR Inspection",text}).catch(()=>{}); }
  else { navigator.clipboard.writeText(text).then(()=>toast("Summary copied")).catch(()=>toast("Copy failed")); }
}

/* ---------- FLEET list (read from FCR Fleet Manager) ---------- */
async function renderUnits(){
  const main=$("#main"); main.innerHTML="";
  main.append(el("h1",{class:"screen"},"Fleet"));
  main.append(el("p",{class:"sub"},"Synced from FCR Fleet. Tap a unit to see its inspection history."));
  const insps=await DB.all("inspections");
  const countFor=fid=>insps.filter(i=>i.machineId===fid).length;
  if(FLEET.length===0){
    main.append(el("div",{class:"empty"},el("span",{class:"ico"},"🛥️"),"No fleet loaded on this device yet. Open FCR Fleet once to sync your units, then come back."));
  }else{
    const list=el("div",{class:"list"});
    FLEET.slice().sort((a,b)=>machineName(a).localeCompare(machineName(b),undefined,{numeric:true})).forEach(m=>{
      const down=m.status&&m.status!=="available";
      list.append(el("div",{class:"item"+(down?" muted":""),onclick:()=>go("unit",{fid:m.fid})},
        el("span",{class:"pill in"}, m.type),
        el("div",{class:"meta"}, el("b",{}, machineName(m)), el("small",{}, countFor(m.fid)+" inspection(s)"+(down?" · "+m.status:""))),
        el("div",{class:"when"},"›")));
    });
    main.append(list);
  }
  main.append(el("div",{class:"banner",style:"margin-top:18px"},
    "Units are managed in FCR Fleet — add or edit them there and they show up here. Cloud backup of inspection media is off until storage is connected; media auto-clears after "+CONFIG.retentionDays+" days unless flagged for a claim."));
  action(
    el("button",{class:"btn secondary",onclick:()=>go("home")},"Back"),
    el("button",{class:"btn ghost",onclick:async()=>{ toast("Refreshing fleet…"); await loadFleet(); renderUnits(); }},"↻ Refresh fleet")
  );
}

/* ---------- single UNIT (read-only details + inspection history) ---------- */
async function renderUnit(){
  const main=$("#main"); main.innerHTML="";
  const m=FLEET.find(u=>u.fid===App.params.fid) || {fid:App.params.fid,name:"Unknown unit"};
  main.append(el("h1",{class:"screen"}, machineName(m)));

  const kv=el("dl",{class:"kv"});
  const add=(k,v)=>{ kv.append(el("dt",{},k),el("dd",{}, v||"—")); };
  add("Year", m.yr||"—");
  add("Category", m.type||"—");
  add("Unit #", m.mid||"—");
  add("Status", m.status||"—");
  main.append(el("div",{class:"card-block"}, el("h3",{},"Unit details"), kv,
    el("button",{class:"btn ghost",style:"margin-top:14px",onclick:()=>window.open(FLEET_SRC.manageUrl,"_blank")},"Edit in FCR Fleet →")));

  const insps=(await DB.all("inspections")).filter(i=>i.machineId===m.fid).sort((a,b)=>b.createdAt-a.createdAt);
  main.append(el("div",{class:"section-h"}, el("h2",{},"Inspection history — "+insps.length), null));
  if(insps.length===0) main.append(el("div",{class:"empty"},"No inspections logged for this unit yet."));
  else { const list=el("div",{class:"list"}); insps.forEach(i=>list.append(itemRow(i))); main.append(list); }

  action(el("button",{class:"btn secondary",onclick:()=>go("units")},"Back to fleet"));
}
function closeModal(){ $("#modal").classList.remove("open"); if(["home","history"].includes(App.screen)) render(); }
$("#modal").addEventListener("click",e=>{ if(e.target.id==="modal") closeModal(); });
document.addEventListener("pointerdown",e=>{ if(!e.target.closest(".ac")) document.querySelectorAll(".ac-list").forEach(l=>l.classList.add("hidden")); });

/* ---------- PHOTOS & VIDEOS (all media) ---------- */
async function renderGallery(){
  const main=$("#main"); main.innerHTML="";
  main.append(el("h1",{class:"screen"},"Photos & videos"));
  const [insps, media] = await Promise.all([DB.all("inspections"), DB.all("media")]);
  const byId={}; insps.forEach(i=>byId[i.id]=i);
  media.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  if(!media.length){
    main.append(el("div",{class:"empty"},el("span",{class:"ico"},"\uD83D\uDCC1"),"No photos or videos yet. They land here the moment you capture during a checkout or check-in."));
    action(el("button",{class:"btn secondary",onclick:()=>go("home")},"Home"));
    return;
  }
  const photoN=media.filter(m=>m.kind==="photo").length, vidN=media.length-photoN;
  main.append(el("div",{class:"gallhead"},
    el("div",{}, el("b",{}, media.length+" item"+(media.length>1?"s":"")),
      el("small",{}, photoN+" photo"+(photoN!==1?"s":"")+" \u00b7 "+vidN+" video"+(vidN!==1?"s":""))),
    el("button",{class:"btn small",onclick:async ev=>{
      const btn=ev.currentTarget, old=btn.textContent; btn.textContent="Zipping\u2026"; btn.disabled=true;
      try{
        const files=media.map(m=>({name:mediaFileName(m, byId[m.inspectionId]&&byId[m.inspectionId].machineName), blob:m.blob}));
        const seen={}; files.forEach(f=>{ if(seen[f.name]){ const n=++seen[f.name]; f.name=f.name.replace(/(\.[^.]+)$/,"-"+n+"$1"); } else seen[f.name]=1; });
        downloadBlob(await zipStore(files),"FCR-media-"+Date.now()+".zip");
      }catch(e){ toast("Zip failed"); }
      btn.textContent=old; btn.disabled=false;
    }}, "\u2193 Download all")
  ));
  const g=el("div",{class:"media-grid"});
  media.forEach(m=>{
    const insp=byId[m.inspectionId]||{};
    const url=URL.createObjectURL(m.blob);
    const cell=el("div",{class:"cell gcell"});
    if(m.kind==="photo") cell.append(el("img",{src:url}));
    else cell.append(el("video",{src:url,controls:"",playsinline:""}));
    cell.append(el("span",{class:"tag"}, m.kind.toUpperCase()));
    cell.append(el("button",{class:"dlbtn",title:"Download",onclick:e=>{e.stopPropagation();downloadBlob(m.blob,mediaFileName(m,insp.machineName));}},"\u2193"));
    cell.append(el("div",{class:"gcap"},
      el("b",{}, insp.machineName||"Unit"),
      el("small",{}, (insp.type==="checkout"?"Out":insp.type==="checkin"?"In":"\u2014")+" \u00b7 "+fmtTime(m.createdAt||insp.createdAt||Date.now())),
      insp.id?el("button",{class:"link",style:"padding:2px 0;font-size:12px",onclick:()=>go("record",{id:insp.id})},"Open record \u2192"):null
    ));
    g.append(cell);
  });
  main.append(g);
  action(el("button",{class:"btn secondary",onclick:()=>go("home")},"Home"));
}

/* ---------- render dispatch ---------- */
function render(){
  const map={home:renderHome,history:renderHistory,new:renderNew,capture:renderCapture,sign:renderSign,record:renderRecord,units:renderUnits,unit:renderUnit,gallery:renderGallery};
  (map[App.screen]||renderHome)();
}

/* ---------- boot ---------- */
(async function boot(){
  setNet(navigator.onLine?"online":"off");
  await loadFleet().catch(()=>{});
  await runRetention().catch(()=>{});
  render();
  syncNow();
})();
</script>
